<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Sentiment Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>
<body>
<div class="card">
<h1>🎬 Movie Sentiment Analyzer</h1>
<p>Type your movie review below 👇</p>
<form method="POST">
<textarea name="review" placeholder=" Type your review..." required></textarea>
<button>Analyze</button>
</form>
{% if prediction %}
{% if prediction == "positive" %}
    <div class="result-box positive-box">
        <h2>😊 Positive Review</h2>
        <p>Confidence: 85%</p>

        <div class="progress">
            <div class="progress-fill positive-fill"></div>
        </div>
    </div>

{% elif prediction == "negative" %}
    <div class="result-box negative-box">
        <h2>😡 Negative Review</h2>
        <p>Confidence: 85%</p>

        <div class="progress">
            <div class="progress-fill negative-fill"></div>
        </div>
    </div>
{% endif %}{% endif %}
</div>
</body>
</html>
